<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Theo dõi đơn hàng</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Inter", sans-serif;
        }

        body {
            background: #f8f8f8;
        }

        .container {
            max-width: 600px;
            margin: 80px auto;
            background: #fff;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
        }

        h1 {
            text-align: center;
            color: #d71920;
            margin-bottom: 25px;
        }

        .input-box {
            display: flex;
            gap: 10px;
            margin-bottom: 25px;
        }

        input {
            flex: 1;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #ccc;
        }

        button {
            background: #d71920;
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 8px;
            cursor: pointer;
        }

        button:hover {
            background: #b9151b;
        }

        .result {
            display: none;
            background: #f3f3f3;
            padding: 20px;
            border-radius: 10px;
        }

        .status {
            margin-top: 15px;
        }

        .step {
            margin: 10px 0;
            padding: 10px;
            border-left: 4px solid #ccc;
        }

        .active {
            border-left: 4px solid #d71920;
            font-weight: bold;
        }

        .btn-home {
            display: block;
            margin-top: 20px;
            text-align: center;
            text-decoration: none;
            padding: 12px;
            background: #d71920;
            color: white;
            border-radius: 8px;
        }

        .btn-home:hover {
            background: #b9151b;
        }
    </style>
</head>

<body>

<div class="container">

    <h1>📦 Theo dõi đơn hàng</h1>

    <div class="input-box">
        <input type="text" id="orderId" placeholder="Nhập mã đơn hàng...">
        <button onclick="trackOrder()">Tra cứu</button>
    </div>

    <div class="result" id="resultBox">
        <h3>Mã đơn: <span id="showId"></span></h3>

        <div class="status">
            <div class="step active">✔ Đã đặt hàng</div>
            <div class="step active">🚚 Đang giao hàng</div>
            <div class="step">📦 Giao thành công</div>
        </div>
    </div>

    <a href="index.html" class="btn-home">🏠 Về trang chủ</a>

</div>

<script>
function trackOrder() {
    const id = document.getElementById("orderId").value;

    if (!id) {
        alert("Nhập mã đơn hàng!");
        return;
    }

    document.getElementById("resultBox").style.display = "block";
    document.getElementById("showId").innerText = id;
}
</script>

</body>
</html>
